<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu cartão</title>
<style>
body  {
    background-color: rgb(19, 17, 10);
    }
  .card-carlbank{   /* estilazação do cartão*/
    width:320px;
    height:190px;

    padding:20px;

    border-radius:20px;

    color:white;

    background: linear-gradient(
        135deg,
        gold,
        black,
        gold
    );

    box-shadow:
        0 20px 40px rgba(5, 1, 1, 0.25);

    position:relative;

    overflow:hidden;
}

.det {
  font-family:'Segoe UI',sans-serif;  /*estilazação das letras*/
}

/* brilho estilo Nubank */
.card-carlbank::before {
    content: "";               /*tamanho e posição do cartão */
    position: fixed;

    width: 200px;
    height: 200px;


    border-radius: 50%;

    top: 50vh;
    left: 50vw;
    transform: translate(-50%, -50%);
}

form{
    background: white;      /*cor do form */
    border-radius: 15px;
    border-radius: 4px;
    padding: 20px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

/* número do cartão */
.numero{
    letter-spacing:3px;
    font-size:18px;
    margin-top:10px;
}

/* nome e validade */
.info{
    display:flex;
    justify-content:space-between;

    margin-top:20px;

    font-size:14px;
    opacity:.9;
}

form {
    font-family: 'Segoe UI', sans-serif;
}
p, form,{
 font-family: 'Segoe UI', sans-serif;

}
</style>
</head>
<body>
    <center>
    
    <div class="card-carlbank">

    <h3>CarlBank Platinum</h3>

    <div class="chip"></div>

    <p class="numero">
        **** **** **** 4587
    </p>
   
    <div class="info">
        <span>Usuario</span>
        <span>12/29</span>
    </div>
</div>
</center>
<br>
<div class="det">
    <form>

        <h3>Detalhes do Cartão</h3>
        
       <form>
        <p style="color: green;"> Total: R$ 8.000,00</p>
       </form>
    <br>
        <form>
        <p style="color: green;"> Disponível: R$ 4.659,50</p>
        </form>
    <br>
       <form>
        <p style="color: rgb(190, 190, 18);"> Fatura Atual: R$ 3.340,50</p>
       </form>
     <br>
       <form>
        <p style="color: green"> Melhor dia de Compra: 25</p>
        <p style="color:red;"> Vencimento: 05</p>
        </form>
     <br>
    </form>
    </div>
</div>
    
</body>
</html>
