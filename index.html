<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarlBank</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

/* TOPO */

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#f59e0b;
}

.logo span{
    color:#0f172a;
}

.usuario{
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#f59e0b;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.btn-cartao{
    background:#f59e0b;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.btn-cartao:hover{
    background:#d97706;
}

/* TÍTULO */

h2{
    margin-bottom:20px;
    color:#0f172a;
}

/* CARDS */

.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:250px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card span{
    color:#777;
    font-size:13px;
    display:block;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

.verde{
    color:#10b981;
}

.azul{
    color:#3b82f6;
}

.vermelho{
    color:#ef4444;
}

/* FORM */

.transferencia{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    max-width:700px;
}

.transferencia h3{
    margin-bottom:20px;
}

label{
    font-weight:600;
}

input[type="text"]{
    width:100%;
    padding:12px;
    border:1px solid #dbe1ea;
    border-radius:10px;
    margin-top:5px;
}

.radio-group{
    margin-top:15px;
    display:flex;
    gap:20px;
}

.transferir{
    width:100%;
    margin-top:20px;
    background:#0f172a;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.transferir:hover{
    background:#1e293b;
}

.radio-group{
    display:flex;
    gap:15px;

    justify-content:center; /* centralizar horizontalmente */

    margin-top:10px;
}

</style>
</head>

<body>

<div class="topo">

    <div class="logo">
        Carl<span>Bank</span>
    </div>

    <div class="usuario">

        <button href="meucartão.html" class="btn-cartao">
            💳 Meus Cartões
        </button>

        <span>Usuário</span>

        <div class="avatar">
            US
        </div>

    </div>

</div>

<h2>Visão Geral</h2>

<div class="cards">

    <div class="card">
        <span>PATRIMÔNIO TOTAL</span>
        <p class="verde">R$ 145.450,00</p>
    </div>

    <div class="card">
        <span>CAIXA DISPONÍVEL</span>
        <p class="azul">R$ 12.200,00</p>
    </div>

    <div class="card">
        <span>FATURA ATUAL</span>
        <p class="vermelho">R$ 3.340,50</p>
    </div>

</div>
<center>
<form class="transferencia">

    <h3>Transferência Rápida</h3>

    <label>Valor (R$)</label>
    <br>
    <input
        type="text"
        placeholder="0,00"
        required>

    <br><br>

    <label>Chave PIX / Conta</label>
    <br>

    <input
        type="text"
        placeholder="CPF, E-mail ou Agência/Conta"
        required>

    <br><br>

    <label>Tipo de Transação</label>

    <div class="radio-group">

        <div>
            <input type="radio" name="tipo" required>
            PIX
        </div>

        <div>
            <input type="radio" name="tipo">
            TED
        </div>

        <div>
            <input type="radio" name="tipo">
            DOC
        </div>

    </div>

    <br>

    <input type="checkbox">
    Salvar este contato

    <button class="transferir">
        Transferir
    </button>
</center>
</form>

</body>
</html>
